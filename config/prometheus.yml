# ═══════════════════════════════════════════════════════════════════════════════
#  SENTIENT OS - Prometheus Configuration
# ═══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sentient-os'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files: []

# Scrape configurations
scrape_configs:
  # ─────────────────────────────────────────────────────────────────────────────
  #  Prometheus self-monitoring
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # ─────────────────────────────────────────────────────────────────────────────
  #  SENTIENT Gateway
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'sentient-gateway'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          instance: 'gateway'
          service: 'api'
    metrics_path: '/metrics'

  # ─────────────────────────────────────────────────────────────────────────────
  #  PostgreSQL Exporter (if using)
  # ─────────────────────────────────────────────────────────────────────────────
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # ─────────────────────────────────────────────────────────────────────────────
  #  Redis Exporter (if using)
  # ─────────────────────────────────────────────────────────────────────────────
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # ─────────────────────────────────────────────────────────────────────────────
  #  Node Exporter (system metrics)
  # ─────────────────────────────────────────────────────────────────────────────
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

  # ─────────────────────────────────────────────────────────────────────────────
  #  NVIDIA GPU Exporter (if using GPU)
  # ─────────────────────────────────────────────────────────────────────────────
  # - job_name: 'nvidia'
  #   static_configs:
  #     - targets: ['nvidia-exporter:9445']

  # ─────────────────────────────────────────────────────────────────────────────
  #  Ollama metrics (if exposed)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama:11434']
    metrics_path: '/api/metrics'

  # ─────────────────────────────────────────────────────────────────────────────
  #  Qdrant metrics
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: '/metrics'
