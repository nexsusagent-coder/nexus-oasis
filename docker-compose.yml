# SENTIENT AI OS - Docker Compose
# Full development and production stack

version: '3.8'

services:
  # ==========================================
  # SENTIENT Gateway
  # ==========================================
  sentient:
    build:
      context: .
      dockerfile: Dockerfile
    image: sentient/ai:${VERSION:-latest}
    container_name: sentient-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgres://sentient:sentient@postgres:5432/sentient
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - sentient-data:/app/data
      - sentient-config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sentient-network

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: sentient-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sentient
      - POSTGRES_PASSWORD=sentient
      - POSTGRES_DB=sentient
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentient"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentient-network

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: sentient-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentient-network

  # ==========================================
  # MinIO (S3-compatible storage)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: sentient-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - sentient-network

  # ==========================================
  # Qdrant Vector Database
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sentient-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - sentient-network

  # ==========================================
  # Prometheus Metrics
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: sentient-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - sentient-network

  # ==========================================
  # Grafana Dashboard
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: sentient-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=sentient
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - sentient-network

  # ==========================================
  # Nginx Reverse Proxy
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: sentient-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      - sentient
    networks:
      - sentient-network

# ==========================================
# Networks
# ==========================================
networks:
  sentient-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  sentient-data:
  sentient-config:
  postgres-data:
  redis-data:
  minio-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
