# ═══════════════════════════════════════════════════════════════════════════════
#  SENTIENT OS - Release Pipeline v2.0
#  Multi-platform builds with all binaries
# ═══════════════════════════════════════════════════════════════════════════════

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v4.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  #  Build Matrix - All Platforms
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            bin_ext: ''
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            bin_ext: ''
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            bin_ext: ''
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            bin_ext: ''
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            bin_ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Cross-compilation setup for ARM Linux
      - name: Install cross-compiler (ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build binaries
        run: |
          cargo build --release --target ${{ matrix.target }} `
            --bin sentient --bin sentient-shell --bin sentient-setup --bin sentient-web `
            --bin sentient-selfcoder --bin sentient-sync-daemon --bin sentient-ingest
        shell: bash

      - name: Prepare release directory
        shell: bash
        run: |
          mkdir -p release/bin
          for bin in sentient sentient-shell sentient-setup sentient-web sentient-selfcoder sentient-sync-daemon sentient-ingest; do
            src="target/${{ matrix.target }}/release/${bin}${{ matrix.bin_ext }}"
            if [ -f "$src" ]; then
              cp "$src" release/bin/
              echo "✓ Added: ${bin}${{ matrix.bin_ext }}"
            else
              echo "✗ Missing: ${bin}${{ matrix.bin_ext }}"
            fi
          done
          ls -la release/bin/

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czvf sentient-${{ matrix.target }}.tar.gz -C release .

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path release/* -DestinationPath sentient-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentient-${{ matrix.target }}
          path: sentient-${{ matrix.target }}.*
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  #  Create GitHub Release
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sentient-*
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -name "*.tar.gz" -exec cp {} release-files/ \;
          find artifacts -name "*.zip" -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate checksums
        run: |
          cd release-files
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: SENTIENT OS ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ steps.version.outputs.VERSION }}
          body: |
            ## 🧠 SENTIENT OS ${{ steps.version.outputs.VERSION }}
            
            ### Hızlı Kurulum
            
            **Linux/macOS:**
            ```bash
            curl -fsSL https://get.sentient.ai | sh
            ```
            
            **Windows (PowerShell):**
            ```powershell
            irm https://get.sentient.ai/ps | iex
            ```
            
            ### Manuel Kurulum
            
            | Platform | Dosya |
            |----------|-------|
            | Linux x86_64 | `sentient-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux ARM64 | `sentient-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS Intel | `sentient-x86_64-apple-darwin.tar.gz` |
            | macOS Apple Silicon | `sentient-aarch64-apple-darwin.tar.gz` |
            | Windows x86_64 | `sentient-x86_64-pc-windows-msvc.zip` |
            
            ### Binary'ler
            
            - `sentient` - Ana CLI
            - `sentient-shell` - Interactive shell
            - `sentient-setup` - Kurulum sihirbazı
            - `sentient-web` - Web dashboard
            - `sentient-selfcoder` - Self-coding agent
            - `sentient-sync-daemon` - Arka plan sync servisi
            - `sentient-ingest` - Data ingestion tool
            
            ### Değişiklikler
            
            Detaylı changelog için: [CHANGELOG.md](CHANGELOG.md)

          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
          generate_release_notes: true
          files: |
            release-files/*

  # ────────────────────────────────────────────────────────────────────────────
  #  Update Install Scripts
  # ────────────────────────────────────────────────────────────────────────────
  update-scripts:
    name: Update Install Scripts
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in scripts
        run: |
          # Update install.sh
          sed -i 's/VERSION=".*"/VERSION="${{ steps.version.outputs.VERSION }}"/g' install.sh
          sed -i 's/VERSION=".*"/VERSION="${{ steps.version.outputs.VERSION }}"/g' quick-install.sh
          
          # Update install.ps1
          sed -i 's/$Version = "latest"/$Version = "${{ steps.version.outputs.VERSION }}"/g' install.ps1 || true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install.sh quick-install.sh install.ps1
          git commit -m "chore: update version to ${{ steps.version.outputs.VERSION }}" || echo "No changes"
          git push || echo "Nothing to push"
