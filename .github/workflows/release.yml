# ═══════════════════════════════════════════════════════════════════════════════
#  SENTIENT OS - Release Pipeline
# ═══════════════════════════════════════════════════════════════════════════════

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v4.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  #  Build Release Binaries
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/sentient-cli release/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/dashboard release/ 2>/dev/null || true
          tar -czvf sentient-${{ matrix.target }}.tar.gz -C release .
          
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release
          copy target/${{ matrix.target }}/release/sentient-cli.exe release/ 2>nul || true
          copy target/${{ matrix.target }}/release/dashboard.exe release/ 2>nul || true
          Compress-Archive -Path release/* -DestinationPath sentient-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentient-${{ matrix.target }}
          path: sentient-${{ matrix.target }}.*

  # ────────────────────────────────────────────────────────────────────────────
  #  Create Release
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: SENTIENT OS ${{ steps.version.outputs.VERSION }}
          body: |
            ## 🧠 SENTIENT OS ${{ steps.version.outputs.VERSION }}
            
            ### Kurulum
            
            ```bash
            # Linux/macOS
            tar -xzf sentient-*.tar.gz
            ./sentient-cli setup
            
            # Windows
            Expand-Archive sentient-*.zip
            .\sentient-cli.exe setup
            ```
            
            ### Yenilikler
            
            - Detaylı changelog için bkz. [CHANGELOG.md](CHANGELOG.md)
            
            ### Checksums
            
            | Dosya | SHA256 |
            |-------|--------|
            | sentient-x86_64-unknown-linux-gnu.tar.gz | Otomatik |
            | sentient-x86_64-apple-darwin.tar.gz | Otomatik |
            | sentient-aarch64-apple-darwin.tar.gz | Otomatik |
            | sentient-x86_64-pc-windows-msvc.zip | Otomatik |

          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
          generate_release_notes: true
          files: |
            artifacts/**/*

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > ../checksums.txt
          cat ../checksums.txt

  # ────────────────────────────────────────────────────────────────────────────
  #  Update Homebrew (Optional)
  # ────────────────────────────────────────────────────────────────────────────
  homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push'
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: nexsusagent-coder/homebrew-sentient
          token: ${{ secrets.HOMEBREW_TOKEN }}
        continue-on-error: true

      - name: Update formula
        if: success()
        run: |
          echo "Homebrew tap update would go here"
