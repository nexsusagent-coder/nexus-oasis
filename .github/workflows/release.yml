# ═══════════════════════════════════════════════════════════════════════════════
#  SENTIENT CORE - Release Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Cross-platform binary builds
#  - Linux (x86_64, ARM64)
#  - macOS (x86_64, ARM64/Apple Silicon)
#  - Windows (x86_64)

name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: '4.0.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install cross-compiler for ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            SENTIENT_CORE/target
          key: linux-${{ matrix.target }}-${{ hashFiles('SENTIENT_CORE/Cargo.lock') }}
      
      - name: Build
        run: |
          cd SENTIENT_CORE
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}
      
      - name: Package
        run: |
          cd SENTIENT_CORE
          mkdir -p release
          cp target/${{ matrix.target }}/release/sentient-cli release/ || true
          cp target/${{ matrix.target }}/release/nexus-dashboard release/ || true
          tar -czvf sentient-${{ matrix.target }}.tar.gz -C release .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentient-${{ matrix.target }}
          path: SENTIENT_CORE/sentient-${{ matrix.target }}.tar.gz

  build-macos:
    name: macOS ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            SENTIENT_CORE/target
          key: macos-${{ matrix.target }}-${{ hashFiles('SENTIENT_CORE/Cargo.lock') }}
      
      - name: Build
        run: |
          cd SENTIENT_CORE
          cargo build --release --target ${{ matrix.target }}
      
      - name: Package
        run: |
          cd SENTIENT_CORE
          mkdir -p release
          cp target/${{ matrix.target }}/release/sentient-cli release/ || true
          cp target/${{ matrix.target }}/release/nexus-dashboard release/ || true
          tar -czvf sentient-${{ matrix.target }}.tar.gz -C release .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentient-${{ matrix.target }}
          path: SENTIENT_CORE/sentient-${{ matrix.target }}.tar.gz

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            SENTIENT_CORE/target
          key: windows-x86_64-${{ hashFiles('SENTIENT_CORE/Cargo.lock') }}
      
      - name: Build
        run: |
          cd SENTIENT_CORE
          cargo build --release --target x86_64-pc-windows-msvc
      
      - name: Package
        run: |
          cd SENTIENT_CORE
          mkdir release
          copy target\x86_64-pc-windows-msvc\release\sentient-cli.exe release\ || echo "CLI not found"
          copy target\x86_64-pc-windows-msvc\release\nexus-dashboard.exe release\ || echo "Dashboard not found"
          Compress-Archive -Path release\* -DestinationPath sentient-x86_64-pc-windows-msvc.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentient-x86_64-pc-windows-msvc
          path: SENTIENT_CORE/sentient-x86_64-pc-windows-msvc.zip

  publish-release:
    name: Publish Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: find artifacts -type f
      
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: artifacts/**/*
