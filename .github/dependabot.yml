# ═══════════════════════════════════════════════════════════════════════════════
#  SENTIENT OS - Dependabot Configuration
# ═══════════════════════════════════════════════════════════════════════════════

version: 2

updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "nexsusagent-coder"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      tokio:
        patterns:
          - "tokio"
          - "tokio-*"
      serde:
        patterns:
          - "serde"
          - "serde_*"
      tower:
        patterns:
          - "tower"
          - "tower-*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
