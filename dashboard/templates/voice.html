<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTIENT Voice - JARVIS Level Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --accent: #00ff88;
            --accent-dim: #00aa5c;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --error: #ff4444;
            --warning: #ffaa00;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }
        
        /* Header */
        .header {
            margin-bottom: 60px;
        }
        
        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            margin-bottom: 10px;
        }
        
        .tagline {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
        }
        
        /* Voice Interface */
        .voice-interface {
            position: relative;
            margin-bottom: 40px;
        }
        
        /* Waveform Canvas */
        .waveform-container {
            width: 100%;
            height: 200px;
            background: var(--bg-secondary);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid var(--bg-tertiary);
        }
        
        #voiceWaveform {
            width: 100%;
            height: 100%;
        }
        
        /* Mic Button */
        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--bg-tertiary), var(--bg-secondary));
            border: 3px solid var(--bg-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 2px 10px rgba(255, 255, 255, 0.05);
        }
        
        .mic-button:hover {
            transform: scale(1.05);
            border-color: var(--accent-dim);
        }
        
        .mic-button.listening {
            border-color: var(--accent);
            box-shadow: 
                0 10px 30px rgba(0, 255, 136, 0.3),
                0 0 60px rgba(0, 255, 136, 0.2),
                inset 0 2px 10px rgba(255, 255, 255, 0.05);
            animation: pulse 1.5s infinite;
        }
        
        .mic-button.processing {
            border-color: var(--warning);
            animation: spin 1s linear infinite;
        }
        
        .mic-button.speaking {
            border-color: #4488ff;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }
            50% { box-shadow: 0 0 60px rgba(0, 255, 136, 0.5); }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .mic-icon {
            width: 50px;
            height: 50px;
            fill: var(--text-primary);
            transition: fill 0.3s ease;
        }
        
        .mic-button.listening .mic-icon {
            fill: var(--accent);
        }
        
        /* Status */
        .status {
            margin-top: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 8px 20px;
            border-radius: 20px;
            background: var(--bg-secondary);
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .status.connected {
            color: var(--accent);
        }
        
        .status.disconnected {
            color: var(--error);
        }
        
        .status.listening {
            color: var(--accent);
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Transcripts */
        .transcripts {
            margin-top: 40px;
            text-align: left;
        }
        
        .transcript-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 3px solid var(--bg-tertiary);
        }
        
        .transcript-box.partial {
            border-left-color: var(--text-secondary);
            opacity: 0.7;
        }
        
        .transcript-box.final {
            border-left-color: var(--accent);
        }
        
        .transcript-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .transcript-text, .response-text {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .transcript-text {
            color: var(--text-primary);
        }
        
        .response-text {
            color: var(--accent);
        }
        
        /* Shortcuts */
        .shortcuts {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .shortcut {
            display: inline-block;
            background: var(--bg-secondary);
            padding: 5px 12px;
            border-radius: 6px;
            margin: 5px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .shortcut kbd {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 5px;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .logo {
                font-size: 1.8rem;
            }
            
            .mic-button {
                width: 100px;
                height: 100px;
            }
            
            .waveform-container {
                height: 150px;
            }
        }
        
        /* Glow effect */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .listening .glow {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">SENTIENT</div>
            <div class="tagline">JARVIS-level Voice Interface</div>
        </header>
        
        <!-- Voice Interface -->
        <div class="voice-interface">
            <!-- Waveform -->
            <div class="waveform-container">
                <canvas id="voiceWaveform"></canvas>
            </div>
            
            <!-- Mic Button -->
            <button id="micButton" class="mic-button" title="Tıkla veya Space tuşuna bas">
                <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            
            <!-- Status -->
            <div id="voiceStatus" class="status disconnected">Bağlanıyor...</div>
        </div>
        
        <!-- Transcripts -->
        <div class="transcripts">
            <div class="transcript-box">
                <div class="transcript-label">Söylediğiniz</div>
                <div id="transcript" class="transcript-text">Mikrofona konuşun...</div>
            </div>
            
            <div class="transcript-box">
                <div class="transcript-label">SENTIENT Yanıtı</div>
                <div id="response" class="response-text">...</div>
            </div>
        </div>
        
        <!-- Shortcuts -->
        <div class="shortcuts">
            <span class="shortcut"><kbd>Space</kbd> Mikrofonu aç/kapat</span>
            <span class="shortcut"><kbd>Esc</kbd> Durdur</span>
        </div>
    </div>
    
    <!-- Scripts -->
    <script>
        // Simple logger
        const log = {
            info: (...args) => console.log('%c[INFO]', 'color: #00ff88', ...args),
            warn: (...args) => console.log('%c[WARN]', 'color: #ffaa00', ...args),
            error: (...args) => console.log('%c[ERROR]', 'color: #ff4444', ...args),
            debug: (...args) => console.log('%c[DEBUG]', 'color: #666', ...args)
        };
    </script>
    <script src="/assets/js/voice.js"></script>
</body>
</html>
