# ─── ASENA LOGROTATE ───
# Log dosyalarının otomatik yönetimi
#
# Kurulum:
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/asena
#   sudo logrotate -f /etc/logrotate.d/asena

/root/ASENA_CORE/data/logs/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0644 root root
    sharedscripts
    postrotate
        # Servislere SIGHUP gönder (log dosyasını yeniden aç)
        systemctl reload asena-main > /dev/null 2>&1 || true
        systemctl reload asena-gateway > /dev/null 2>&1 || true
    endscript
}

/root/ASENA_CORE/data/logs/*.json {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0644 root root
}
