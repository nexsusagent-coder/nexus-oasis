name: "openclaw-browser-navigate"
description: "Tarayıcıda sayfa gezinme ve otomasyon"
metadata:
  version: "0.1.0"
  asena:
    category: "browser"
    source_repo: "openclaw"
    source_file: "navigate.ts"
    language: "typescript"
    risk_level: "medium"
    assimilated_at: "2026-04-06 16:30:00"

parameters:
  - name: "url"
    type: "string"
    required: true
    default: null
    description: "Hedef URL"
  - name: "wait_for"
    type: "string"
    required: false
    default: "load"
    description: "Bekleme koşulu"

commands:
  - "navigate(url, options)"

dependencies:
  - "puppeteer"

