name: "openclaw-web-search"
description: "Web'de arama yapma ve sonuçları işleme skill'i"
metadata:
  version: "0.1.0"
  asena:
    category: "search"
    source_repo: "openclaw"
    source_file: "index.ts"
    language: "typescript"
    risk_level: "low"
    assimilated_at: "2026-04-06 16:30:00"

parameters:
  - name: "query"
    type: "string"
    required: true
    default: null
    description: "Arama sorgusu"
  - name: "max_results"
    type: "number"
    required: false
    default: "10"
    description: "Maksimum sonuç sayısı"

commands:
  - "search(query, maxResults)"

dependencies:
  - "playwright"
  - "cheerio"

