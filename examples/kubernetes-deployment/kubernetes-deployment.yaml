# Kubernetes Deployment Example
#
# This example shows how to deploy SENTIENT to Kubernetes
# using the custom operator and standard resources.
#
# Prerequisites:
# - Kubernetes cluster (v1.28+)
# - kubectl configured
# - SENTIENT operator installed
#
# Usage:
#   kubectl apply -f kubernetes-deployment/

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: sentient
  labels:
    app.kubernetes.io/name: sentient
    app.kubernetes.io/part-of: sentient-ai

---
# ConfigMap for configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentient-config
  namespace: sentient
data:
  config.toml: |
    [llm]
    provider = "openai"
    model = "gpt-4o"
    
    [memory]
    type = "lancedb"
    path = "/data/memory"
    
    [channels]
    telegram = { enabled = true }
    discord = { enabled = true }
    
    [voice]
    enabled = false
    
    [enterprise]
    enabled = true
    tenant_id = "default"

---
# Secret for API keys
apiVersion: v1
kind: Secret
metadata:
  name: sentient-secrets
  namespace: sentient
type: Opaque
stringData:
  openai-api-key: "sk-..."
  anthropic-api-key: "sk-ant-..."
  telegram-bot-token: "..."
  discord-bot-token: "..."

---
# PersistentVolumeClaim for data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sentient-data
  namespace: sentient
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentient
  namespace: sentient
  labels:
    app: sentient
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentient
  template:
    metadata:
      labels:
        app: sentient
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: sentient
      containers:
        - name: sentient
          image: sentient/ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentient-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentient-secrets
                  key: anthropic-api-key
            - name: RUST_LOG
              value: "info,sentient=debug"
          volumeMounts:
            - name: config
              mountPath: /etc/sentient
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: sentient-config
        - name: data
          persistentVolumeClaim:
            claimName: sentient-data

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: sentient
  namespace: sentient
spec:
  selector:
    app: sentient
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 9090
      targetPort: 9090
      name: metrics
  type: ClusterIP

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentient-hpa
  namespace: sentient
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentient
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120

---
# Custom Resource Definition - SentientAgent
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sentientagents.sentient.ai
spec:
  group: sentient.ai
  names:
    kind: SentientAgent
    listKind: SentientAgentList
    plural: sentientagents
    singular: sentientagent
    shortNames:
      - sa
      - agent
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                model:
                  type: string
                  default: "gpt-4o"
                channels:
                  type: array
                  items:
                    type: string
                skills:
                  type: array
                  items:
                    type: string
                memory:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    size:
                      type: string
                      default: "10Gi"
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
              required:
                - name
            status:
              type: object
              properties:
                ready:
                  type: boolean
                messageCount:
                  type: integer
                lastActive:
                  type: string
                  format: date-time

---
# Example SentientAgent CR
apiVersion: sentient.ai/v1
kind: SentientAgent
metadata:
  name: assistant-agent
  namespace: sentient
spec:
  name: "General Assistant"
  model: "gpt-4o"
  channels:
    - telegram
    - discord
  skills:
    - web-search
    - calculator
  memory:
    enabled: true
    size: "5Gi"
  resources:
    cpu: "500m"
    memory: "1Gi"

---
# Ingress (optional)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentient-ingress
  namespace: sentient
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - sentient.example.com
      secretName: sentient-tls
  rules:
    - host: sentient.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentient
                port:
                  number: 80
