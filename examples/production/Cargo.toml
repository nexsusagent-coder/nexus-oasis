[package]
name = "sentient-production"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = "0.3"

sentient_core = { path = "../../crates/sentient_core" }
sentient_gateway = { path = "../../crates/sentient_gateway" }
sentient_memory = { path = "../../crates/sentient_memory" }
sentient_guardrails = { path = "../../crates/sentient_guardrails" }
sentient_observability = { path = "../../crates/sentient_observability" }
