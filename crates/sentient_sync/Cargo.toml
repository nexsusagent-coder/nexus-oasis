[package]
name = "sentient_sync"
version = "0.1.0"
edition = "2021"
authors = ["SENTIENT OS Team"]
description = "Silent Auto-Update Engine for integrated repositories"
license = "MIT"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
git2 = "0.18"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1.0"
thiserror = "1.0"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
hex = "0.4"
regex = "1.10"
walkdir = "2.4"
notify = "6.1"
parking_lot = "0.12"
once_cell = "1.19"
actix-web = "4.4"
hmac = "0.12"
reqwest = { version = "0.11", features = ["json"] }

[dev-dependencies]
tempfile = "3.9"

[[bin]]
name = "sentient-sync-daemon"
path = "src/bin/daemon.rs"
