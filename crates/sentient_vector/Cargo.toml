[package]
name = "sentient_vector"
version.workspace = true
edition = "2021"
description = "SENTIENT Vector Database Integration - ChromaDB, Qdrant, Weaviate"
authors = ["SENTIENT Core Team"]

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
async-trait = "0.1"
uuid = { version = "1.7", features = ["v4", "serde"] }
thiserror = "1.0"
reqwest = { workspace = true }

# Vector DB clients
qdrant-client = { version = "1.7", optional = true }

[features]
default = []
qdrant = ["qdrant-client"]

[lib]
name = "sentient_vector"
path = "src/lib.rs"
