[package]
name = "sentient_vector"
version.workspace = true
edition = "2021"
description = "SENTIENT Vector Database Integration - Qdrant, ChromaDB, Weaviate, Pinecone, Milvus, Elasticsearch"
authors = ["SENTIENT Core Team"]

[dependencies]
# Async runtime
tokio = { workspace = true }
async-trait = "0.1"

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# HTTP client
reqwest = { workspace = true }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
tracing = { workspace = true }
log = "0.4"

# Utilities
uuid = { version = "1.7", features = ["v4", "serde"] }

# Optional native clients
qdrant-client = { version = "1.7", optional = true }

[features]
default = []
qdrant-native = ["qdrant-client"]

[lib]
name = "sentient_vector"
path = "src/lib.rs"
