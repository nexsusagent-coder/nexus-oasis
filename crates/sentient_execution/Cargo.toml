[package]
name = "sentient_execution"
version = "3.0.0"
edition = "2021"
description = "SENTIENT Code Execution - Open Interpreter, E2B Sandbox"
authors = ["SENTIENT Core Team"]

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
async-trait = "0.1"
thiserror = "1.0"
uuid = { version = "1.7", features = ["v4", "serde"] }

# Sandbox integration
bollard = { version = "0.18", optional = true }

[features]
default = []
docker = ["bollard"]

[lib]
name = "sentient_execution"
path = "src/lib.rs"
