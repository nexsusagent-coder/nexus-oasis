[package]
name = "sentient_tee"
version.workspace = true
edition.workspace = true
description = "SENTIENT TEE - Trusted Execution Environment (AMD SEV-SNP / Intel TDX)"

[dependencies]
sentient_common = { path = "../sentient_common" }

# Async runtime
tokio.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# IDs
uuid.workspace = true

# Errors
thiserror.workspace = true
anyhow.workspace = true

# Logging
log.workspace = true

# Time
chrono.workspace = true

# Crypto
sha2 = "0.10"
blake3 = "1.5"
hex = "0.4"
aes-gcm = "0.10"
x25519-dalek = { version = "2", features = ["static_secrets"] }
rand = "0.10"
base64 = "0.22"

# Networking
reqwest = { version = "0.11", features = ["json"], optional = true }

# Concurrency
parking_lot.workspace = true

[dev-dependencies]
tempfile = "3"

[features]
default = []
sev-snp = []  # AMD SEV-SNP support
tdx = []      # Intel TDX support
dcap = ["reqwest"]  # Intel DCAP attestation
