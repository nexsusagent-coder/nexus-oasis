[package]
name = "sentient_zk_mcp"
version.workspace = true
edition.workspace = true
description = "SENTIENT ZK-MCP - Zero-Knowledge Proofs for MCP Protocol"

[dependencies]
sentient_common = { path = "../sentient_common" }

# Async runtime
tokio.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# IDs
uuid.workspace = true

# Errors
thiserror.workspace = true
anyhow.workspace = true

# Logging
log.workspace = true

# Time
chrono.workspace = true

# Crypto
blake3 = "1.5"
sha2 = "0.10"
rand.workspace = true

# Math for ZK
num-bigint = "0.4"
num-traits = "0.2"

# Concurrency
parking_lot.workspace = true

# ═══════════════════════════════════════════════════════════════════════════════
# ZK-SNARK Libraries (optional)
# ═══════════════════════════════════════════════════════════════════════════════

# arkworks for Groth16 SNARKs
ark-ff = { version = "0.5", optional = true }
ark-ec = { version = "0.5", optional = true }
ark-groth16 = { version = "0.5", optional = true }
ark-snark = { version = "0.5", optional = true }
ark-bn254 = { version = "0.5", optional = true }
ark-crypto-primitives = { version = "0.5", optional = true }
ark-relations = { version = "0.5", optional = true }
ark-r1cs-std = { version = "0.5", optional = true }
ark-serialize = { version = "0.5", optional = true }

# Bulletproofs (dalek)
bulletproofs = { version = "4.0", optional = true }
curve25519-dalek = { version = "4.0", optional = true, features = ["serde"] }
merlin = { version = "3.0", optional = true }

[features]
default = []

# Groth16 SNARKs (arkworks backend)
groth16 = [
    "dep:ark-ff",
    "dep:ark-ec",
    "dep:ark-groth16",
    "dep:ark-snark",
    "dep:ark-bn254",
    "dep:ark-crypto-primitives",
    "dep:ark-relations",
    "dep:ark-r1cs-std",
    "dep:ark-serialize",
]

# Bulletproofs (dalek backend)
bulletproofs = [
    "dep:bulletproofs",
    "dep:curve25519-dalek",
    "dep:merlin",
]

# PLONK (requires additional setup)
plonk = []

# Production mode (all algorithms available)
production = ["groth16", "bulletproofs"]
