[package]
name = "sentient_reporting"
version = "0.1.0"
edition = "2021"
description = "A8 Research Reporting - Native Report Generation for SENTIENT"
authors = ["NEXUS OASIS"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
tracing = "0.1"
handlebars = "5.0"
markdown = "1.0"
regex = "1.0"

[dev-dependencies]
tokio-test = "0.4"
