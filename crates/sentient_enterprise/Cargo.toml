[package]
name = "sentient_enterprise"
version.workspace = true
edition = "2021"
description = "Enterprise features for SENTIENT AI OS - RBAC, Audit, SSO"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexsusagent-coder/SENTIENT_CORE"
keywords = ["ai", "enterprise", "rbac", "audit", "sso"]
categories = ["authentication", "authorization"]

[dependencies]
# Core
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
thiserror = "1"
tracing = "0.1"
log = "0.4"

# Security
jsonwebtoken = "9"
argon2 = "0.5"
rand = "0.8"
uuid = { version = "1", features = ["v4", "serde"] }

# Database - using rusqlite for consistency with other crates
rusqlite = { version = "0.35", features = ["bundled"] }
# Removed sqlx due to libsqlite3-sys conflict

# SSO
oauth2 = "4"
reqwest = { version = "0.11", features = ["json"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Config
toml = "0.8"

# Audit
sysinfo = "0.30"
ipnetwork = "0.20"

# URL encoding
urlencoding = "2"

# SAML support
base64 = "0.22"
roxmltree = "0.20"
sha1 = "0.10"
sha2 = "0.10"
hmac = "0.13"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
config = "0.14"

[features]
default = ["rbac", "audit", "sso"]
rbac = []
audit = []
sso = []
tee = []
