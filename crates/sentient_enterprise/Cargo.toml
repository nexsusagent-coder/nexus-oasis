[package]
name = "sentient_enterprise"
version = "0.1.0"
edition = "2021"
description = "Enterprise features for SENTIENT AI OS - RBAC, Audit, SSO"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexsusagent-coder/SENTIENT_CORE"
keywords = ["ai", "enterprise", "rbac", "audit", "sso"]
categories = ["authentication", "authorization"]

[dependencies]
# Core
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
thiserror = "1"
tracing = "0.1"

# Security
jsonwebtoken = "9"
argon2 = "0.5"
rand = "0.8"
uuid = { version = "1", features = ["v4", "serde"] }

# Database
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "chrono", "uuid"] }

# SSO
oauth2 = "4"
reqwest = { version = "0.11", features = ["json"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Config
toml = "0.8"

# Audit
sysinfo = "0.30"
ipnetwork = "0.20"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
config = "0.14"

[features]
default = ["rbac", "audit", "sso"]
rbac = []
audit = []
sso = []
tee = []
