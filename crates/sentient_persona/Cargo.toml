[package]
name = "sentient_persona"
version.workspace = true
edition = "2021"
description = "A1 Persona Builder - Native Personality System for SENTIENT"
authors = ["NEXUS OASIS"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
tracing = "0.1"
regex = "1.0"
handlebars = "6.4"
async-trait = "0.1"

[dev-dependencies]
tokio-test = "0.4"
