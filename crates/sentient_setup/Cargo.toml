[package]
name = "sentient-setup"
version.workspace = true
edition = "2021"
description = "SENTIENT Setup Wizard v6.0.0 - Strategic UX Update: Sentient Onboarding with 25+ LLM Providers, 20+ Communication Channels"
authors = ["SENTIENT Core Team"]

[dependencies]
# NO workspace dependencies - fully standalone for Windows compatibility
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

# Modern TUI Libraries (pure Rust, no native deps)
dialoguer = { version = "0.11", features = ["fuzzy-select"] }
inquire = "0.7"
console = "0.15"
indicatif = "0.17"

# Config & Utils
dirs = "5.0"
toml = "0.8"

# Async runtime for progress bars
futures = "0.3"
