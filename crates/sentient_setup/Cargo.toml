[package]
name = "sentient-setup"
version = "6.0.0"
edition = "2021"
description = "SENTIENT Setup Wizard v6.0.0 - Strategic UX Update: Sentient Onboarding with 25+ LLM Providers, 20+ Communication Channels"
authors = ["SENTIENT Core Team"]

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Modern TUI Libraries
dialoguer = { version = "0.11", features = ["fuzzy-select"] }
inquire = "0.7"
console = "0.15"
indicatif = "0.17"

# Config & Utils
dirs = "5.0"
toml = "0.8"
anyhow = { workspace = true }

# Async runtime for progress bars
futures = "0.3"
