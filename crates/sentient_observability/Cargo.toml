[package]
name = "sentient_observability"
version = "0.1.0"
edition = "2021"
description = "Observability module for SENTIENT - tracing, metrics, logging"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-opentelemetry = "0.22"
opentelemetry = { version = "0.22", features = ["trace", "metrics"] }
opentelemetry_sdk = { version = "0.22", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.15", features = ["trace", "metrics", "grpc-tonic"] }
opentelemetry-semantic-conventions = "0.14"
prometheus = "0.13"
lazy_static = "1"
async-trait = "0.1"
anyhow = "1"

[dev-dependencies]
tokio-test = "0.4"
