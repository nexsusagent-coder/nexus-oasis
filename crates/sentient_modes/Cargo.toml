[package]
name = "sentient_modes"
version.workspace = true
edition = "2021"
description = "A5 Six Operation Modes - Native Mode System for SENTIENT"
authors = ["NEXUS OASIS"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
tracing = "0.1"
async-trait = "0.1"
enum_dispatch = "0.3"

[dev-dependencies]
tokio-test = "0.4"
