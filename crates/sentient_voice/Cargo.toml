[package]
name = "sentient_voice"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "SENTIENT Voice Module - STT (Whisper) and TTS integration"

[dependencies]
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
reqwest.workspace = true
async-trait.workspace = true
thiserror.workspace = true
log.workspace = true
chrono.workspace = true
uuid.workspace = true

# Audio processing
cpal = "0.15"
hound = "3"
rubato = "0.15"

# MP3 decoding
minimp3 = "0.5"

# Whisper (via whisper-rs or API)
whisper-rs = { version = "0.11", optional = true }

# Vosk for offline STT
vosk = { version = "0.3", optional = true }

# Porcupine for wake word - REMOVED: not available on crates.io
# For wake word detection, use Vosk or Whisper instead
# pvporcupine = { version = "3", optional = true }

# Other
bytes = "1"
base64 = "0.22"
futures.workspace = true
tokio-stream = "0.1"
parking_lot = "0.12"

sentient_common = { path = "../sentient_common" }

[features]
default = ["api"]
api = []
local-whisper = ["whisper-rs"]
vosk-stt = ["vosk"]
# porcupine-wake removed - pvporcupine not on crates.io
# porcupine-wake = ["pvporcupine"]
full-local = ["local-whisper", "vosk-stt"]
