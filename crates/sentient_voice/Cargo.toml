[package]
name = "sentient_voice"
version.workspace = true
edition.workspace = true
description = "SENTIENT Voice - TTS, STT, Wake Word Detection"
authors = ["SENTIENT Core Team"]

[dependencies]
sentient_common = { path = "../sentient_common" }

# Async
tokio.workspace = true
async-trait = "0.1"

# Serialization
serde.workspace = true
serde_json.workspace = true

# Time
chrono.workspace = true

# Logging
log.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# HTTP client (for API-based TTS/STT)
reqwest = { version = "0.12", features = ["json", "stream", "multipart"] }

# Audio
cpal = "0.15"
rubato = "0.14"  # Audio resampling

# VAD (Voice Activity Detection)
# webrtc-vad = "0.4"  # Disabled - uses old rustc

# UUID
uuid.workspace = true

# Bytes
bytes = "1.5"

[features]
default = []
whisper = []  # Local Whisper STT
porcupine = []  # Picovoice wake word
piper = []  # Piper TTS
