[package]
name = "sentient_session"
version = "0.1.0"
edition = "2021"
description = "A3 Session Tree/Compaction - Native Session Management for SENTIENT"
authors = ["NEXUS OASIS"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
tracing = "0.1"
dashmap = "5.0"
parking_lot = "0.12"
lru = "0.12"
sha2 = "0.10"
hex = "0.4"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"
