[package]
name = "sentient_skills"
version = "0.1.0"
edition = "2021"
description = "SENTIENT OS Skills System - DeerFlow Integration"
authors = ["SENTIENT OS Team"]
license = "MIT"

[dependencies]
# Core
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "2.0"
anyhow = "1.0"

# Async & Concurrency
async-trait = "0.1"
futures = "0.3"
parking_lot = "0.12"

# File & Parsing
walkdir = "2.5"
regex = "1.11"
pulldown-cmark = "0.13"  # Markdown parsing
toml = "0.8"

# Logging
tracing = "0.1"

# Time
chrono = { version = "0.4", features = ["serde"] }

# UUID
uuid = { version = "1.0", features = ["v4", "serde"] }

# Lazy static
once_cell = "1.20"

[dev-dependencies]
tempfile = "3.0"
